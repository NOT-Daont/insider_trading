name: Insider Trading Tracker

on:
  schedule:
    # Run 3x daily on weekdays (Mon–Fri):
    # 14:00 UTC, 18:00 UTC, 22:00 UTC
    - cron: '0 14 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:  # Manual trigger

# Only one run at a time – cancel in-flight if a new one starts
concurrency:
  group: insider-tracker
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python -m src.main
        env:
          PYTHONPATH: .
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Update insider data and portfolio [skip ci]"
          file_pattern: "data/*.db docs/*"
          commit_user_name: "Insider Tracker Bot"
          commit_user_email: "bot@insider-tracker.local"
